<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanya AI - Farmguide</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { 
            --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-500: #3b82f6; --blue-600: #2563eb; 
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; 
            --gray-300: #cbd5e1; --gray-500: #64748b; --gray-700: #334155; --gray-800: #1e293b; 
        }

        body { 
            font-family: 'Poppins', sans-serif; background-color: var(--gray-100); 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh;
        }

        .chat-container { 
            width: 100%; max-width: 650px; height: 90vh; 
            background: white; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Tema Header Berbeda (Biru) agar beda dengan Chat Global */
        .chat-header { 
            background: var(--blue-600); color: white; padding: 20px; 
            display: flex; align-items: center; gap: 16px; z-index: 10;
        }
        .chat-header .icon-bot { background: white; color: var(--blue-600); padding: 8px; border-radius: 50%; display: flex; }
        .chat-header h2 { margin: 0; font-size: 1.2rem; font-weight: 600; }
        .chat-header p { margin: 0; font-size: 0.85rem; opacity: 0.9; }
        .back-btn { color: white; cursor: pointer; transition: transform 0.2s; }
        .back-btn:hover { transform: scale(1.1); }

        .chat-box { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            background: var(--gray-50); scroll-behavior: smooth;
        }

        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .message-sender { font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; margin-left: 4px; display: flex; align-items: center; gap: 6px;}
        
        .message-bubble { 
            padding: 14px 18px; border-radius: 16px; font-size: 0.95rem; 
            line-height: 1.6; word-wrap: break-word;
        }

        /* Pesan AI (Kiri) */
        .msg-ai { align-self: flex-start; }
        .msg-ai .message-sender { color: var(--blue-600); }
        .msg-ai .message-bubble { 
            background: white; color: var(--gray-800); 
            border: 1px solid var(--gray-200); border-top-left-radius: 4px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* Pesan User (Kanan) */
        .msg-user { align-self: flex-end; }
        .msg-user .message-sender { display: none; }
        .msg-user .message-bubble { 
            background: var(--blue-500); color: white; 
            border-top-right-radius: 4px; 
        }

        .chat-input-area { 
            padding: 16px 20px; background: white; border-top: 1px solid var(--gray-200); 
            display: flex; gap: 12px; align-items: center; 
        }
        
        .chat-input { 
            flex: 1; padding: 14px 20px; border: 1px solid var(--gray-200); 
            border-radius: 30px; font-family: inherit; font-size: 0.95rem; outline: none;
        }
        .chat-input:focus { border-color: var(--blue-500); }

        .btn-send { 
            background: var(--blue-600); color: white; border: none; 
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
        }
        .btn-send:disabled { background: var(--gray-300); cursor: not-allowed; }

        .typing-indicator { display: none; align-self: flex-start; color: var(--gray-500); font-style: italic; font-size: 0.85rem; }

        @media (max-width: 600px) { .chat-container { height: 100vh; border-radius: 0; } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <i data-lucide="arrow-left" class="back-btn" onclick="window.location.href='index.html'"></i>
            <div class="icon-bot"><i data-lucide="bot"></i></div>
            <div>
                <h2>Asisten Pintar Farmguide</h2>
                <p id="ai-status">Sedang membaca seluruh modul Anda...</p>
            </div>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message-wrapper msg-ai">
                <div class="message-sender"><i data-lucide="sparkles" style="width: 14px;"></i> Asisten AI</div>
                <div class="message-bubble">Halo! Saya adalah Asisten AI Farmguide. Saya telah membaca modul-modul di aplikasi ini. Ada yang ingin ditanyakan seputar materi pertanian kita?</div>
            </div>
            
            <div id="typing-indicator" class="typing-indicator">Asisten sedang berpikir...</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="msg-input" class="chat-input" placeholder="Tanya sesuatu tentang materi..." autocomplete="off" disabled>
            <button id="btn-send" class="btn-send" disabled><i data-lucide="send"></i></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCOdMX5y27KYI-Sko82wUV89AzG8yJSMxY",
            authDomain: "farmguide-62827.firebaseapp.com",
            projectId: "farmguide-62827",
            storageBucket: "farmguide-62827.firebasestorage.app",
            messagingSenderId: "407792688035",
            appId: "1:407792688035:web:d21abc766dc4589fe11816",
            measurementId: "G-JD66VYW3EG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        // 2. MASUKKAN API KEY GEMINI GOOGLE DI SINI
        // Anda bisa mendapatkannya secara gratis di: https://aistudio.google.com/app/apikey
        const GEMINI_API_KEY = "MASUKKAN_API_KEY_GEMINI_ANDA_DI_SINI"; 

        let databaseKnowledge = ""; // Variabel penyimpan seluruh teks modul dari Firebase

        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const btnSend = document.getElementById('btn-send');
        const typingIndicator = document.getElementById('typing-indicator');
        const aiStatus = document.getElementById('ai-status');

        // 3. Mengambil Konteks Materi dari Firebase saat Halaman Dimuat
        async function loadKnowledgeBase() {
            try {
                const snapshot = await db.collection("isi_modul").get();
                if (snapshot.empty) {
                    databaseKnowledge = "Saat ini belum ada materi modul di database.";
                } else {
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        databaseKnowledge += `\nJudul: ${data.judul}\nMateri: ${data.isi_materi}\n---`;
                    });
                }
                
                // Setelah selesai membaca DB, buka kunci input teks
                aiStatus.innerText = "Online - Siap membantu Anda";
                msgInput.disabled = false;
                btnSend.disabled = false;
                msgInput.focus();

            } catch (error) {
                console.error("Gagal memuat database:", error);
                aiStatus.innerText = "Gagal memuat materi.";
            }
        }

        // Jalankan fungsi pengumpulan data
        loadKnowledgeBase();

        // 4. Menambahkan Pesan ke Layar (UI)
        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender === 'user' ? 'msg-user' : 'msg-ai'}`;

            let senderLabel = sender === 'ai' ? `<div class="message-sender"><i data-lucide="sparkles" style="width: 14px;"></i> Asisten AI</div>` : '';
            
            wrapper.innerHTML = `
                ${senderLabel}
                <div class="message-bubble">${text.replace(/\n/g, '<br>')}</div>
            `;

            // Insert sebelum animasi "typing..."
            chatBox.insertBefore(wrapper, typingIndicator);
            lucide.createIcons();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 5. Fungsi Utama: Bertanya ke API AI dengan Konteks Firebase
        async function askAI(userText) {
            if (GEMINI_API_KEY === "MASUKKAN_API_KEY_GEMINI_ANDA_DI_SINI") {
                appendMessage('ai', "Maaf, API Key belum dikonfigurasi oleh pengembang. Silakan cek kode sumber.");
                return;
            }

            // Prompt yang memaksa AI menjawab berdasarkan data Firebase kita
            const systemPrompt = `
Anda adalah Asisten Virtual Farmguide yang ramah dan membantu. 
Tugas utama Anda adalah menjawab pertanyaan pengguna BERDASARKAN materi pertanian berikut yang diambil dari database aplikasi:

MATERI DATABASE:
${databaseKnowledge}

Aturan:
1. Jawab dengan bahasa Indonesia yang santai namun sopan.
2. Jika jawaban ada di MATERI DATABASE, gunakan informasi itu.
3. Jika pertanyaan menyimpang atau tidak ada di materi, jawab berdasarkan pengetahuan umum Anda tapi sarankan pengguna untuk mencari modul terkait.

Pertanyaan Pengguna: ${userText}
`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();
                
                if(data.candidates && data.candidates.length > 0) {
                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    appendMessage('ai', aiResponseText);
                } else {
                    appendMessage('ai', "Maaf, saya tidak mengerti atau terjadi kesalahan sistem.");
                }

            } catch (error) {
                console.error("API Error:", error);
                appendMessage('ai', "Terjadi kesalahan saat terhubung ke server AI. Mohon coba beberapa saat lagi.");
            }
        }

        // 6. Event Listener Tombol Kirim
        async function handleSend() {
            const text = msgInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            msgInput.value = '';
            
            msgInput.disabled = true;
            btnSend.disabled = true;
            typingIndicator.style.display = "block";
            chatBox.scrollTop = chatBox.scrollHeight;

            await askAI(text);

            typingIndicator.style.display = "none";
            msgInput.disabled = false;
            btnSend.disabled = false;
            msgInput.focus();
        }

        btnSend.addEventListener('click', handleSend);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
